    name: Surplus Start Threshold (W)
    description: "Minimum solar surplus to start EV charging in solar mode (hysteresis)"
  ev_surplus_stop_threshold_w:
    name: Surplus Stop Threshold (W)
    description: "Stop EV solar charging when surplus drops below this value"
  ev_charging_windows:
