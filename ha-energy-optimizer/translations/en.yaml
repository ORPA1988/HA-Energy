    name: EV Charge Mode
    description: "Default charging strategy (solar/min_solar/fast/smart/off)"
  ev_min_charge_current_a:
    name: EV Min Charge Current (A)
    description: "Minimum charging current in amperes (typically 6A)"
  ev_max_charge_current_a:
    name: EV Max Charge Current (A)
    description: "Maximum charging current in amperes (typically 16A or 32A)"
