configuration:
  pv_power_sensor:
    name: PV Power Sensor
    description: "Home Assistant sensor entity for current solar power output (W)"
  pv_forecast_kwp:
    name: PV System Size (kWp)
    description: "Peak power of your solar installation in kilowatt-peak"
  pv_orientation:
    name: PV Orientation
    description: "Panel azimuth in degrees (0=North, 90=East, 180=South, 270=West)"
  pv_tilt:
    name: PV Tilt
    description: "Panel tilt angle in degrees (0=horizontal, 90=vertical)"
  pv_latitude:
    name: Latitude
    description: "Geographic latitude of your PV installation"
  pv_longitude:
    name: Longitude
    description: "Geographic longitude of your PV installation"
  pv_efficiency:
    name: PV Efficiency
    description: "Solar panel efficiency factor (0.0–1.0, typical: 0.18)"
  battery_soc_sensor:
    name: Battery SOC Sensor
    description: "Home Assistant sensor for battery state of charge (%)"
  battery_power_sensor:
    name: Battery Power Sensor
    description: "Home Assistant sensor for battery power (W, positive=charging)"
  battery_capacity_kwh:
    name: Battery Capacity (kWh)
    description: "Usable battery capacity in kilowatt-hours"
  battery_charge_switch:
    name: Battery Charge Switch
    description: "Home Assistant switch entity to enable battery charging"
  battery_discharge_switch:
    name: Battery Discharge Switch
    description: "Home Assistant switch entity to enable battery discharging"
  battery_max_charge_w:
    name: Max Charge Power (W)
    description: "Maximum battery charging power in watts"
  battery_max_discharge_w:
    name: Max Discharge Power (W)
    description: "Maximum battery discharging power in watts"
  battery_min_soc:
    name: Minimum SOC (%)
    description: "Never discharge battery below this level"
  battery_reserve_soc:
    name: Reserve SOC (%)
    description: "Keep battery above this level when EV charging is planned"
