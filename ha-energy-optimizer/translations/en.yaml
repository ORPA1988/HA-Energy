    description: "Send notification when battery balancing starts/stops"
  notify_on_cheap_window:
    name: Notify on Cheap Window
    description: "Send notification when a cheap electricity window is approaching"
  notify_on_ev_charged:
    name: Notify on EV Charged
    description: "Send notification when EV has reached target SOC"
