configuration:
  # --- PV System ---
  pv_power_sensor:
    name: PV Power Sensor
    description: "Home Assistant sensor entity for current solar power output (W)"
  pv_forecast_kwp:
    name: PV System Size (kWp)
    description: "Peak power of your solar installation in kilowatt-peak"
  pv_orientation:
    name: PV Orientation
    description: "Panel azimuth in degrees (0=North, 90=East, 180=South, 270=West)"
  pv_tilt:
    name: PV Tilt
    description: "Panel tilt angle in degrees (0=horizontal, 90=vertical)"
  pv_latitude:
    name: Latitude
    description: "Geographic latitude of your PV installation"
  pv_longitude:
    name: Longitude
    description: "Geographic longitude of your PV installation"
  pv_efficiency:
    name: PV Efficiency
    description: "Solar panel efficiency factor (0.0 - 1.0, typical: 0.18)"
  pv_forecast_source:
    name: PV Forecast Source
    description: "Where to get PV power forecasts: auto (Solcast first, Open-Meteo fallback), solcast, or open_meteo"
  solcast_entity:
    name: Solcast Entity
    description: "Home Assistant Solcast integration entity (e.g. sensor.solcast_pv_forecast_forecast_today). Leave empty to use Open-Meteo."
  solcast_estimate_type:
    name: Solcast Estimate Type
    description: "Which Solcast estimate to use: pv_estimate (50%), pv_estimate10 (conservative), pv_estimate90 (optimistic)"
  # --- Home Battery ---
  battery_soc_sensor:
    name: Battery SOC Sensor
    description: "Home Assistant sensor for battery state of charge (%)"
  battery_power_sensor:
    name: Battery Power Sensor
    description: "Home Assistant sensor for battery power (W, positive=charging)"
  battery_capacity_kwh:
    name: Battery Capacity (kWh)
    description: "Usable battery capacity in kilowatt-hours"
  battery_charge_switch:
    name: Battery Charge Switch
    description: "Home Assistant switch entity to enable/disable battery charging"
  battery_discharge_switch:
    name: Battery Discharge Switch
    description: "Home Assistant switch entity to enable/disable battery discharging"
  battery_max_charge_w:
    name: Max Charge Power (W)
    description: "Maximum battery charging power in watts"
  battery_max_discharge_w:
    name: Max Discharge Power (W)
    description: "Maximum battery discharging power in watts"
  battery_min_soc:
    name: Minimum SOC (%)
    description: "Never discharge battery below this level"
  battery_reserve_soc:
    name: Reserve SOC (%)
    description: "Keep battery above this level when EV charging is planned"
  battery_efficiency:
    name: Battery Efficiency
    description: "Round-trip efficiency of the battery (0.0 - 1.0, typical: 0.95)"
  # --- Battery Balancing ---
  battery_balancing_enabled:
    name: Battery Balancing Enabled
    description: "Enable periodic full-charge cycles for cell equalization"
  battery_balancing_mode:
    name: Balancing Mode
    description: "How balancing is triggered: auto (based on SOC deviation), scheduled, or manual"
  battery_balancing_frequency:
    name: Balancing Frequency
    description: "How often to balance: daily, weekly, monthly, or custom interval"
  battery_balancing_custom_days:
    name: Custom Balancing Interval (days)
    description: "Days between balancing cycles (only used with 'custom' frequency)"
  battery_balancing_target_soc:
    name: Balancing Target SOC (%)
    description: "Charge battery to this SOC during balancing (usually 100%)"
  battery_balancing_hold_duration_h:
    name: Balancing Hold Duration (h)
    description: "Hours to hold at target SOC during balancing"
  battery_balancing_preferred_time:
    name: Preferred Balancing Time
    description: "Preferred time of day to start balancing (HH:MM)"
  battery_balancing_auto_trigger_soc_deviation:
    name: Auto-Trigger SOC Deviation (%)
    description: "Start balancing when cell SOC deviation exceeds this value"
  battery_balancing_use_solar_only:
    name: Balance with Solar Only
    description: "Only use solar power for balancing (don't import from grid)"
  # --- Grid ---
  grid_power_sensor:
    name: Grid Power Sensor
    description: "Home Assistant sensor for grid power (W, positive=import)"
  grid_max_import_w:
    name: Max Grid Import (W)
    description: "Maximum allowed grid import in watts (0=unlimited)"
  total_power_sensor:
    name: Total Power Sensor
    description: "Home Assistant sensor for total house consumption (W). Used for load decomposition."
  # --- Electricity Pricing ---
  price_source:
    name: Price Source
    description: "Where to get electricity prices from"
  entso_e_token:
    name: ENTSO-E API Token
    description: "API token for ENTSO-E Transparency Platform (free registration)"
  entso_e_area:
    name: ENTSO-E Bidding Zone
    description: "EIC code of your bidding zone (e.g. 10YDE-EON------1 for Germany)"
  tibber_token:
    name: Tibber API Token
    description: "API token from Tibber developer portal"
  awattar_country:
    name: aWATTar Country
    description: "Country for aWATTar prices (AT=Austria, DE=Germany)"
  epex_spot_area:
    name: EPEX Spot Area
    description: "Market area for EPEX Spot prices (DE-LU, AT, CH)"
  price_sensor_entity:
    name: Price Sensor Entity
    description: "Home Assistant sensor entity for current electricity price"
  fixed_price_ct_kwh:
    name: Fixed Price (ct/kWh)
    description: "Fallback fixed electricity price"
  epex_import_entity:
    name: EPEX Import Price Entity
    description: "Home Assistant entity for import electricity prices (e.g. sensor.epex_spot_de_price)"
  epex_export_entity:
    name: EPEX Export Price Entity
    description: "Home Assistant entity for export/feed-in prices (optional)"
  epex_unit:
    name: EPEX Price Unit
    description: "Unit of the EPEX price entity values"
  # --- Price Calculation ---
  price_input_is_netto:
    name: Price Input is Netto
    description: "Whether the price source delivers net prices (before VAT)"
  price_vat_percent:
    name: VAT Rate (%)
    description: "Value added tax rate in percent (e.g. 19.0 for Germany)"
  price_grid_fee_source:
    name: Grid Fee Source
    description: "How grid fees are determined: fixed value or from HA entity"
  price_grid_fee_fixed_ct_kwh:
    name: Grid Fee (ct/kWh)
    description: "Fixed grid fee in ct/kWh"
  price_grid_fee_entity:
    name: Grid Fee Entity
    description: "Home Assistant entity for dynamic grid fees"
  price_supplier_markup_ct_kwh:
    name: Supplier Markup (ct/kWh)
    description: "Your electricity supplier's markup in ct/kWh"
  price_other_taxes_ct_kwh:
    name: Other Taxes (ct/kWh)
    description: "Additional taxes and levies in ct/kWh"
  price_feed_in_ct_kwh:
    name: Feed-in Tariff (ct/kWh)
    description: "Compensation for exported electricity"
  # --- go-e Charger ---
  goe_enabled:
    name: go-e Charger Enabled
    description: "Enable go-e Charger integration"
  goe_connection_type:
    name: go-e Connection Type
    description: "Connect to go-e via local network or cloud API"
  goe_local_ip:
    name: go-e Local IP
    description: "Local IP address of go-e Charger (e.g. 192.168.1.100)"
  goe_cloud_serial:
    name: go-e Cloud Serial
    description: "Serial number for go-e Cloud API"
  goe_cloud_token:
    name: go-e Cloud Token
    description: "API token for go-e Cloud"
  goe_max_current_a:
    name: go-e Max Current (A)
    description: "Maximum charging current in amperes (6-32)"
  goe_phases:
    name: go-e Phases
    description: "Number of phases used for charging (1 or 3)"
  # --- EV Configuration ---
  ev_soc_sensor:
    name: EV SOC Sensor
    description: "Home Assistant sensor for electric vehicle battery level (%)"
  ev_battery_capacity_kwh:
    name: EV Battery Capacity (kWh)
    description: "Total battery capacity of your electric vehicle"
  ev_charge_mode:
    name: EV Charge Mode
    description: "Default charging strategy (solar/min_solar/fast/smart/off)"
  ev_min_charge_current_a:
    name: EV Min Charge Current (A)
    description: "Minimum charging current in amperes (usually 6A)"
  ev_max_charge_current_a:
    name: EV Max Charge Current (A)
    description: "Maximum charging current in amperes"
  ev_allow_battery_to_charge_ev:
    name: Allow Battery-to-EV
    description: "Allow home battery to discharge for EV charging"
  ev_allow_grid_to_charge_ev:
    name: Allow Grid-to-EV
    description: "Allow grid import for EV charging"
  ev_combined_charge_threshold_ct:
    name: Combined Charge Threshold (ct/kWh)
    description: "Use grid+solar combined charging when price is below this threshold"
  ev_surplus_start_threshold_w:
    name: Surplus Start Threshold (W)
    description: "Minimum solar surplus to start EV charging in solar mode (hysteresis)"
  ev_surplus_stop_threshold_w:
    name: Surplus Stop Threshold (W)
    description: "Stop EV solar charging when surplus drops below this value"
  ev_charging_windows:
    name: EV Charging Windows
    description: "Time windows when EV charging is allowed"
  ev_configs:
    name: EV/Wallbox Configurations
    description: "List of configured electric vehicles and wallboxes"
  # --- Deferrable Loads ---
  deferrable_loads:
    name: Deferrable Loads
    description: "Flexible loads that can be scheduled to cheaper hours"
  # --- Operation Mode ---
  read_only:
    name: "Read-Only Mode"
    description: "When enabled: system only reads sensors, no switching or control actions. Ideal for initial setup testing."
  operation_mode:
    name: "Operation Mode"
    description: "Stopped: No optimization or scheduling active. Running: All optimizations and controls active."
  # --- Optimization ---
  optimizer_backend:
    name: Optimizer Backend
    description: "Optimization engine: built-in (scipy LP/HiGHS) or EMHASS (ML + CVXPY)"
  optimization_goal:
    name: Optimization Goal
    description: "What to optimize for: cost, self-consumption, or balanced"
  optimization_interval_minutes:
    name: Optimization Interval (min)
    description: "How often the LP optimizer runs (in minutes)"
  long_term_plan_interval_hours:
    name: Long-Term Plan Interval (h)
    description: "How often the 48h genetic planner runs (in hours)"
  peak_shaving_limit_w:
    name: Peak Shaving Limit (W)
    description: "Discharge battery when grid import exceeds this (0=disabled)"
  # --- Notifications ---
  notify_target:
    name: Notification Target
    description: "Home Assistant notification service (e.g. notify.mobile_app)"
  notify_on_balancing:
    name: Notify on Balancing
    description: "Send notification when battery balancing starts/completes"
  notify_on_cheap_window:
    name: Notify on Cheap Window
    description: "Send notification when a cheap price window is upcoming"
  notify_on_ev_charged:
    name: Notify on EV Charged
    description: "Send notification when EV reaches target SOC"
