name: "EnergieHA"
version: "0.3.8"
slug: "energieha"
description: "Lightweight energy management for PV, battery, grid and consumers"
url: "https://github.com/ORPA1988/HA-Energy"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
init: false
homeassistant_api: true
startup: application
boot: auto
map:
  - config:ro
options:
  strategy: "surplus"
  cycle_seconds: 300
  slot_duration_min: 15

  # Hausbatterie (Leistung wird vom Wechselrichter vorgegeben)
  battery_capacity_kwh: 30.0
  min_soc_percent: 15
  max_soc_percent: 95
  round_trip_efficiency: 0.85

  # PHEV (Peugeot 308 SW Hybrid via go-eCharger)
  phev_enabled: false
  phev_min_charge_w: 1380
  phev_max_charge_w: 3680
  phev_battery_kwh: 14.0
  phev_voltage: 230
  entity_phev_soc: "sensor.psa_battery_level"
  entity_phev_charging_power: "sensor.garage_wallbox_power"
  entity_phev_connected: "sensor.psa_charging_status"
  entity_phev_ampere_limit: "number.go_echarger_403613_set_max_ampere_limit"

  # Sensor-Entitaeten (Inverter / Netz / PV)
  entity_battery_soc: "sensor.inverter_battery"
  entity_battery_power: "sensor.inverter_battery_power"
  entity_pv_power: "sensor.inverter_pv_power"
  entity_grid_power: "sensor.inverter_grid_power"
  entity_load_power: "sensor.inverter_load_power"
  entity_epex_prices: "sensor.epex_spot_data_total_price"
  entity_solcast_forecast: "sensor.solcast_pv_forecast_prognose_heute"
  entity_solcast_forecast_tomorrow: "sensor.solcast_pv_forecast_prognose_morgen"

  # Strategieparameter
  min_price_spread_eur: 0.04
  price_threshold_eur: 0.15
  estimated_daily_load_kwh: 12.0

  dry_run: true

  # SOC-Grenzen
  max_grid_charge_soc: 80

  # Sungrow TOU Steuerung (programmiert die 6 TOU-Programme des Wechselrichters)
  sungrow_tou_enabled: false

  # EMHASS Optimierung (erfordert laufendes EMHASS Add-on)
  emhass_url: "http://localhost:5000"

schema:
  strategy: "list(surplus|price|forecast|emhass)"
  cycle_seconds: "int(60,900)"
  slot_duration_min: "list(15|60)"
  battery_capacity_kwh: "float(0.1,)"
  min_soc_percent: "int(0,100)"
  max_soc_percent: "int(0,100)"
  round_trip_efficiency: "float(0.5,1.0)"
  phev_enabled: bool
  phev_min_charge_w: "int(0,)"
  phev_max_charge_w: "int(0,)"
  phev_battery_kwh: "float(0,)"
  phev_voltage: "int(100,400)"
  entity_phev_soc: str
  entity_phev_charging_power: str
  entity_phev_connected: str
  entity_phev_ampere_limit: str
  entity_battery_soc: str
  entity_battery_power: str
  entity_pv_power: str
  entity_grid_power: str
  entity_load_power: str
  entity_epex_prices: str
  entity_solcast_forecast: str
  entity_solcast_forecast_tomorrow: str
  min_price_spread_eur: "float(0,)"
  price_threshold_eur: "float(0,)"
  estimated_daily_load_kwh: "float(0,)"
  dry_run: bool
  max_grid_charge_soc: "int(0,100)"
  sungrow_tou_enabled: bool
  emhass_url: str
